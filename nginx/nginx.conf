events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---------- Logs ----------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server_tokens off;

    # ---------- Backends ----------
    upstream web_backend {
        server web:8080;
        keepalive 32;
    }

    upstream opencv_backend {
        server opencv:5001;
        keepalive 16;
    }

    # ============================================================
    #  HTTP : redirection systématique vers HTTPS
    # ============================================================
    server {
        listen      80;
        server_name _;

        return 301 https://$host$request_uri;
    }

    # ============================================================
    #  HTTPS : application
    # ============================================================
    server {
        listen      443 ssl;
        server_name _;

        # ---------- TLS ----------
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               HIGH:!aNULL:!MD5:!RC4;
        ssl_prefer_server_ciphers on;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       10m;

        # ---------- Security headers ----------
        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;

        # ---------- Flux vidéo MJPEG (Flask /video -> OpenCV -> ESP32) ----------
        # IMPORTANT : doit être déclaré AVANT location / pour avoir priorité
        location /video {
            proxy_pass         http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Cookie            $http_cookie;
            proxy_set_header   Connection        "";

            # Réglages indispensables pour un flux MJPEG longue durée
            proxy_buffering           off;
            proxy_cache               off;
            proxy_request_buffering   off;
            chunked_transfer_encoding off;
            proxy_read_timeout        3600s;
            proxy_send_timeout        3600s;
        }

        # ---------- Server-Sent Events (faces / people / alerts) ----------
        location /api/events {
            proxy_pass         http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Cookie            $http_cookie;
            proxy_set_header   Connection        "";

            # SSE = connexion longue durée, jamais bufferiser
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
        }

        # ---------- API REST ----------
        location /api/ {
            proxy_pass         http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection        "";
        }

        # ---------- Healthcheck ----------
        location /health {
            proxy_pass         http://web_backend/health;
            proxy_http_version 1.1;
            proxy_set_header   Host       $host;
            proxy_set_header   Connection "";
        }

        # ---------- Application web (login, /, /static, etc.) ----------
        location / {
            proxy_pass         http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}
