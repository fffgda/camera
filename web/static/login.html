<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connexion</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="wrap auth-wrap">
    <section class="card auth-card">
      <h1>Connexion</h1>
      <p class="sub">Connectez-vous pour accéder à la caméra.</p>

      <form id="loginForm" class="auth-form">
        <label>
          <span>Nom d'utilisateur</span>
          <input id="username" type="text" autocomplete="username" required />
        </label>
        <label>
          <span>Mot de passe</span>
          <input id="password" type="password" autocomplete="current-password" required />
        </label>
        <button class="small" type="submit">Se connecter</button>
      </form>

      <p id="error" class="error"></p>
      <p class="hint">Comptes par défaut: admin/admin123 et viewer/viewer123.</p>
    </section>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const error = document.getElementById("error");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      error.textContent = "";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const body = await res.json();
        if (!res.ok) {
          throw new Error(body.error || "Connexion impossible");
        }

        window.location.href = "/";
      } catch (err) {
        error.textContent = err.message;
      }
    });
  </script>
</body>
</html>
